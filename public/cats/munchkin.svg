<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 먼치킨: 서포터형, 짧은 다리, 줄무늬 -->

  <!-- 꼬리 -->
  <path d="M68 72 Q82 65 79 52 Q78 46 72 48" stroke="#9B7B5A" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 몸통 -->
  <ellipse cx="48" cy="65" rx="24" ry="20" fill="#C4956A"/>
  <!-- 배 -->
  <ellipse cx="48" cy="68" rx="15" ry="12" fill="#E8C4A0"/>

  <!-- 줄무늬 (타비 패턴) -->
  <line x1="38" y1="56" x2="36" y2="78" stroke="#9B7B5A" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="48" y1="54" x2="48" y2="77" stroke="#9B7B5A" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="58" y1="56" x2="60" y2="78" stroke="#9B7B5A" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- 뒷다리 (짧고 통통 — 먼치킨 특징) -->
  <ellipse cx="35" cy="84" rx="10" ry="5" fill="#9B7B5A"/>
  <ellipse cx="61" cy="84" rx="10" ry="5" fill="#9B7B5A"/>

  <!-- 앞발 (짧고 통통) -->
  <ellipse cx="25" cy="70" rx="9" ry="6" fill="#9B7B5A" transform="rotate(-5 25 70)"/>
  <ellipse cx="71" cy="70" rx="9" ry="6" fill="#9B7B5A" transform="rotate(5 71 70)"/>

  <!-- 머리 (통통하고 귀여운) -->
  <circle cx="48" cy="35" r="21" fill="#C4956A"/>

  <!-- 이마 줄무늬 -->
  <path d="M42 18 Q44 22 42 26" stroke="#9B7B5A" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M48 16 Q48 21 48 25" stroke="#9B7B5A" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M54 18 Q52 22 54 26" stroke="#9B7B5A" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- 귀 (작고 귀여운) -->
  <polygon points="30,22 25,7 41,19" fill="#C4956A"/>
  <polygon points="66,22 75,7 59,19" fill="#C4956A"/>
  <polygon points="32,21 28,11 40,20" fill="#FFB6C1"/>
  <polygon points="64,21 72,11 60,20" fill="#FFB6C1"/>

  <!-- 눈 (초롱초롱 큰 눈) -->
  <ellipse cx="40" cy="33" rx="7.5" ry="7.5" fill="white"/>
  <ellipse cx="56" cy="33" rx="7.5" ry="7.5" fill="white"/>
  <circle cx="41" cy="34" r="5.5" fill="#7B4F2E"/>
  <circle cx="57" cy="34" r="5.5" fill="#7B4F2E"/>
  <circle cx="41" cy="34" r="3" fill="#3D1A00"/>
  <circle cx="57" cy="34" r="3" fill="#3D1A00"/>
  <circle cx="42.5" cy="32" r="2" fill="white"/>
  <circle cx="58.5" cy="32" r="2" fill="white"/>
  <circle cx="41" cy="35.5" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="57" cy="35.5" r="0.8" fill="white" opacity="0.6"/>

  <!-- 코 -->
  <ellipse cx="48" cy="41" rx="3" ry="2.2" fill="#FF9CB0"/>
  <!-- 입 -->
  <path d="M44 44 Q48 48 52 44" stroke="#7B4F2E" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 수염 -->
  <line x1="22" y1="41" x2="38" y2="42" stroke="#7B4F2E" stroke-width="1.3" opacity="0.6"/>
  <line x1="22" y1="44" x2="38" y2="44" stroke="#7B4F2E" stroke-width="1.3" opacity="0.6"/>
  <line x1="74" y1="41" x2="58" y2="42" stroke="#7B4F2E" stroke-width="1.3" opacity="0.6"/>
  <line x1="74" y1="44" x2="58" y2="44" stroke="#7B4F2E" stroke-width="1.3" opacity="0.6"/>

  <!-- 별 EXP 마크 (서포터) -->
  <polygon points="86,18 88,24 94,24 89,28 91,34 86,30 81,34 83,28 78,24 84,24" fill="#FFD700" opacity="0.75"/>
  <polygon points="86,18 88,24 94,24 89,28 91,34 86,30 81,34 83,28 78,24 84,24" fill="none" stroke="#CC8800" stroke-width="0.5" opacity="0.5"/>
</svg>

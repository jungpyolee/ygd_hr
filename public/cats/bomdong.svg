<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 봄동비빔밥: 다채로운 색감의 시너지형 고양이 -->

  <!-- 꼬리 -->
  <path d="M70 72 Q86 60 80 44 Q78 38 72 42" stroke="#2D8A3E" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 꼬리 끝 포인트 색 -->
  <circle cx="72" cy="42" r="4" fill="#FF6B35"/>

  <!-- 몸통 -->
  <ellipse cx="48" cy="63" rx="26" ry="22" fill="#3AA34A"/>
  <!-- 배 (봄동 연초록) -->
  <ellipse cx="48" cy="66" rx="17" ry="14" fill="#7DD87A"/>

  <!-- 비빔밥 재료 색 포인트들 (배 위) -->
  <circle cx="42" cy="62" r="3" fill="#FF6B35" opacity="0.8"/> <!-- 당근 -->
  <circle cx="52" cy="60" r="2.5" fill="#F4D03F" opacity="0.8"/> <!-- 노른자 -->
  <circle cx="46" cy="70" r="2.5" fill="#8B2252" opacity="0.7"/> <!-- 시금치 -->
  <circle cx="56" cy="67" r="2" fill="#E74C3C" opacity="0.7"/> <!-- 고추장 -->

  <!-- 뒷다리 -->
  <ellipse cx="33" cy="83" rx="10" ry="6" fill="#2D8A3E"/>
  <ellipse cx="63" cy="83" rx="10" ry="6" fill="#2D8A3E"/>

  <!-- 앞발 -->
  <ellipse cx="23" cy="66" rx="9" ry="7" fill="#2D8A3E" transform="rotate(-15 23 66)"/>
  <ellipse cx="73" cy="66" rx="9" ry="7" fill="#2D8A3E" transform="rotate(15 73 66)"/>

  <!-- 머리 -->
  <circle cx="48" cy="36" r="21" fill="#3AA34A"/>

  <!-- 귀 -->
  <polygon points="29,24 24,8 40,20" fill="#3AA34A"/>
  <polygon points="67,24 76,8 60,20" fill="#3AA34A"/>
  <!-- 귀 안쪽 -->
  <polygon points="31,23 27,13 39,21" fill="#FF9CB0"/>
  <polygon points="65,23 73,13 61,21" fill="#FF9CB0"/>

  <!-- 봄 꽃장식 귀 위 -->
  <circle cx="27" cy="9" r="3" fill="#FFB7C5"/>
  <circle cx="25" cy="7" r="2" fill="#FF8FAA"/>
  <circle cx="73" cy="9" r="3" fill="#FFB7C5"/>
  <circle cx="75" cy="7" r="2" fill="#FF8FAA"/>

  <!-- 눈 (초롱초롱) -->
  <ellipse cx="40" cy="34" rx="7" ry="7" fill="white"/>
  <ellipse cx="56" cy="34" rx="7" ry="7" fill="white"/>
  <circle cx="41" cy="35" r="4.5" fill="#1A5C1A"/>
  <circle cx="57" cy="35" r="4.5" fill="#1A5C1A"/>
  <!-- 별빛 하이라이트 -->
  <circle cx="43" cy="32.5" r="1.8" fill="white"/>
  <circle cx="59" cy="32.5" r="1.8" fill="white"/>
  <circle cx="40.5" cy="36" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="56.5" cy="36" r="0.8" fill="white" opacity="0.7"/>

  <!-- 코 -->
  <ellipse cx="48" cy="41" rx="2.5" ry="2" fill="#FF9CB0"/>
  <!-- 입 -->
  <path d="M44 44 Q48 47 52 44" stroke="#2D8A3E" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 수염 -->
  <line x1="24" y1="41" x2="40" y2="42" stroke="#1A5C1A" stroke-width="1" opacity="0.6"/>
  <line x1="24" y1="44" x2="40" y2="44" stroke="#1A5C1A" stroke-width="1" opacity="0.6"/>
  <line x1="72" y1="41" x2="56" y2="42" stroke="#1A5C1A" stroke-width="1" opacity="0.6"/>
  <line x1="72" y1="44" x2="56" y2="44" stroke="#1A5C1A" stroke-width="1" opacity="0.6"/>

  <!-- 비빔밥 그릇 (발 밑) -->
  <ellipse cx="48" cy="92" rx="22" ry="7" fill="#B8860B" opacity="0.6"/>
  <ellipse cx="48" cy="91" rx="20" ry="5" fill="#DAA520" opacity="0.4"/>

  <!-- 시너지 별 이펙트 -->
  <polygon points="48,4 50,10 56,10 51,14 53,20 48,16 43,20 45,14 40,10 46,10" fill="#F4D03F" opacity="0.7"/>
</svg>

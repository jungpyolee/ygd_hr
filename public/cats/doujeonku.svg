<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 두쫀쿠: 두꺼운 황금 구운 전 탱커 고양이 -->

  <!-- 꼬리 -->
  <path d="M72 72 Q88 65 85 50 Q84 44 78 46" stroke="#C47A1A" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- 몸통 (크고 두꺼운 원형) -->
  <ellipse cx="48" cy="62" rx="30" ry="26" fill="#D4921C"/>
  <!-- 배 무늬 (구운 전 색) -->
  <ellipse cx="48" cy="65" rx="20" ry="17" fill="#E8A830"/>
  <!-- 구운 무늬 -->
  <ellipse cx="42" cy="60" rx="5" ry="3" fill="#C47A1A" opacity="0.4" transform="rotate(-15 42 60)"/>
  <ellipse cx="55" cy="68" rx="4" ry="3" fill="#C47A1A" opacity="0.4" transform="rotate(10 55 68)"/>

  <!-- 뒷다리 -->
  <ellipse cx="32" cy="85" rx="11" ry="7" fill="#C47A1A"/>
  <ellipse cx="64" cy="85" rx="11" ry="7" fill="#C47A1A"/>

  <!-- 앞발 (두껍고 짧음) -->
  <ellipse cx="22" cy="68" rx="10" ry="8" fill="#C47A1A" transform="rotate(-10 22 68)"/>
  <ellipse cx="74" cy="68" rx="10" ry="8" fill="#C47A1A" transform="rotate(10 74 68)"/>
  <!-- 발톱 -->
  <line x1="16" y1="72" x2="13" y2="76" stroke="#A05C10" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="74" x2="18" y2="78" stroke="#A05C10" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="72" x2="79" y2="76" stroke="#A05C10" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="74" x2="82" y2="78" stroke="#A05C10" stroke-width="2" stroke-linecap="round"/>

  <!-- 머리 -->
  <circle cx="48" cy="36" r="22" fill="#D4921C"/>

  <!-- 귀 -->
  <polygon points="28,22 22,6 38,18" fill="#D4921C"/>
  <polygon points="68,22 78,6 62,18" fill="#D4921C"/>
  <!-- 귀 안쪽 -->
  <polygon points="30,21 26,11 37,19" fill="#E8A830"/>
  <polygon points="66,21 74,11 63,19" fill="#E8A830"/>

  <!-- 눈 (강인한 눈) -->
  <ellipse cx="40" cy="34" rx="7" ry="6" fill="white"/>
  <ellipse cx="56" cy="34" rx="7" ry="6" fill="white"/>
  <circle cx="41" cy="35" r="4" fill="#3D1A00"/>
  <circle cx="57" cy="35" r="4" fill="#3D1A00"/>
  <!-- 눈 하이라이트 -->
  <circle cx="43" cy="33" r="1.5" fill="white"/>
  <circle cx="59" cy="33" r="1.5" fill="white"/>
  <!-- 눈썹 (강인) -->
  <line x1="34" y1="27" x2="46" y2="29" stroke="#8B4A00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="29" x2="50" y2="27" stroke="#8B4A00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 코 -->
  <ellipse cx="48" cy="41" rx="3" ry="2" fill="#FF9966"/>
  <!-- 입 -->
  <path d="M44 44 Q48 48 52 44" stroke="#8B4A00" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 수염 -->
  <line x1="24" y1="41" x2="40" y2="42" stroke="#8B4A00" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="44" x2="40" y2="44" stroke="#8B4A00" stroke-width="1.2" opacity="0.7"/>
  <line x1="72" y1="41" x2="56" y2="42" stroke="#8B4A00" stroke-width="1.2" opacity="0.7"/>
  <line x1="72" y1="44" x2="56" y2="44" stroke="#8B4A00" stroke-width="1.2" opacity="0.7"/>

  <!-- 방어막 오라 (탱커 느낌) -->
  <circle cx="48" cy="50" r="44" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 아비시니안: 스피드형, 날렵한 갈색 고양이 -->

  <!-- 속도 이펙트 -->
  <ellipse cx="15" cy="58" rx="9" ry="5" fill="#D4721C" opacity="0.15" transform="rotate(-15 15 58)"/>
  <ellipse cx="10" cy="52" rx="6" ry="3" fill="#D4721C" opacity="0.09" transform="rotate(-20 10 52)"/>

  <!-- 꼬리 (길고 날렵) -->
  <path d="M70 67 Q88 52 85 34 Q84 27 77 30" stroke="#C06010" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- 몸통 (날렵한) -->
  <ellipse cx="47" cy="63" rx="22" ry="18" fill="#D4721C"/>
  <!-- 배 -->
  <ellipse cx="47" cy="66" rx="14" ry="11" fill="#E8A868"/>

  <!-- 줄무늬 (아비시니안 특징) -->
  <line x1="39" y1="55" x2="37" y2="74" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="47" y1="53" x2="47" y2="72" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="55" y1="55" x2="57" y2="74" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

  <!-- 뒷다리 (길고 날렵) -->
  <ellipse cx="33" cy="82" rx="9" ry="5" fill="#C06010" transform="rotate(-12 33 82)"/>
  <ellipse cx="63" cy="82" rx="9" ry="5" fill="#C06010" transform="rotate(12 63 82)"/>

  <!-- 앞발 (뛰는 자세) -->
  <ellipse cx="22" cy="63" rx="8" ry="6" fill="#C06010" transform="rotate(-20 22 63)"/>
  <ellipse cx="73" cy="65" rx="8" ry="6" fill="#C06010" transform="rotate(15 73 65)"/>

  <!-- 머리 (작고 날렵) -->
  <ellipse cx="47" cy="35" rx="19" ry="20" fill="#D4721C"/>

  <!-- 귀 (크고 날카로운 - 아비시니안 특징) -->
  <polygon points="28,20 20,2 40,16" fill="#D4721C"/>
  <polygon points="66,20 80,2 60,16" fill="#D4721C"/>
  <polygon points="30,19 24,7 39,17" fill="#E8C4A0"/>
  <polygon points="64,19 76,7 61,17" fill="#E8C4A0"/>

  <!-- 이마 줄무늬 -->
  <line x1="42" y1="17" x2="41" y2="27" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="47" y1="15" x2="47" y2="25" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="52" y1="17" x2="53" y2="27" stroke="#C06010" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>

  <!-- 눈 (크고 선명한 황색) -->
  <ellipse cx="39" cy="33" rx="7" ry="6.5" fill="white"/>
  <ellipse cx="55" cy="33" rx="7" ry="6.5" fill="white"/>
  <circle cx="40" cy="34" r="5" fill="#CC7700"/>
  <circle cx="56" cy="34" r="5" fill="#CC7700"/>
  <circle cx="40" cy="34" r="3" fill="#442200"/>
  <circle cx="56" cy="34" r="3" fill="#442200"/>
  <circle cx="41.5" cy="32" r="1.8" fill="white"/>
  <circle cx="57.5" cy="32" r="1.8" fill="white"/>

  <!-- 코 -->
  <ellipse cx="47" cy="40" rx="2.5" ry="2" fill="#FF9966"/>
  <!-- 입 -->
  <path d="M43 43 Q47 46 51 43" stroke="#8A4C14" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 수염 -->
  <line x1="22" y1="40" x2="38" y2="41" stroke="#8A4C14" stroke-width="1" opacity="0.7" transform="rotate(-5 30 40.5)"/>
  <line x1="22" y1="43" x2="38" y2="43" stroke="#8A4C14" stroke-width="1" opacity="0.7"/>
  <line x1="72" y1="40" x2="56" y2="41" stroke="#8A4C14" stroke-width="1" opacity="0.7" transform="rotate(5 64 40.5)"/>
  <line x1="72" y1="43" x2="56" y2="43" stroke="#8A4C14" stroke-width="1" opacity="0.7"/>

  <!-- 번개 스피드 마크 -->
  <path d="M83 15 L78 24 L82 24 L77 33" stroke="#FFD700" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>

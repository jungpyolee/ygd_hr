<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 강정: 황금빛 뻥튀기 과자 군주 -->
  <!-- 몸통 - 불규칙한 뻥튀기 모양 -->
  <ellipse cx="50" cy="55" rx="36" ry="28" fill="#E8A020" />
  <!-- 거친 표면 질감 -->
  <ellipse cx="38" cy="45" rx="8" ry="6" fill="#F0B030" opacity="0.8"/>
  <ellipse cx="60" cy="48" rx="7" ry="5" fill="#F0B030" opacity="0.8"/>
  <ellipse cx="45" cy="63" rx="9" ry="5" fill="#F0B030" opacity="0.8"/>
  <ellipse cx="62" cy="62" rx="6" ry="4" fill="#F0B030" opacity="0.8"/>
  <!-- 깨 알갱이들 -->
  <circle cx="42" cy="48" r="2" fill="#8B6914"/>
  <circle cx="55" cy="44" r="1.5" fill="#8B6914"/>
  <circle cx="35" cy="58" r="2" fill="#8B6914"/>
  <circle cx="65" cy="57" r="1.5" fill="#8B6914"/>
  <circle cx="50" cy="65" r="2" fill="#8B6914"/>
  <circle cx="48" cy="55" r="1.5" fill="#8B6914"/>
  <circle cx="60" cy="52" r="2" fill="#8B6914"/>
  <!-- 눈 -->
  <circle cx="42" cy="53" r="5" fill="white"/>
  <circle cx="58" cy="53" r="5" fill="white"/>
  <circle cx="43" cy="54" r="3" fill="#1a0800"/>
  <circle cx="59" cy="54" r="3" fill="#1a0800"/>
  <!-- 눈 하이라이트 -->
  <circle cx="44" cy="52.5" r="1" fill="white"/>
  <circle cx="60" cy="52.5" r="1" fill="white"/>
  <!-- 왕관 -->
  <polygon points="30,32 35,18 42,28 50,14 58,28 65,18 70,32" fill="#FFD700" stroke="#CC9900" stroke-width="1.5"/>
  <circle cx="50" cy="16" r="3" fill="#FF4444"/>
  <circle cx="35" cy="20" r="2" fill="#FF4444"/>
  <circle cx="65" cy="20" r="2" fill="#FF4444"/>
  <!-- 입 -->
  <path d="M44 60 Q50 65 56 60" stroke="#6B3A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 팔 (돌기) -->
  <ellipse cx="20" cy="55" rx="10" ry="7" fill="#D4921C" transform="rotate(-20 20 55)"/>
  <ellipse cx="80" cy="55" rx="10" ry="7" fill="#D4921C" transform="rotate(20 80 55)"/>
  <!-- 발 -->
  <ellipse cx="38" cy="82" rx="10" ry="5" fill="#D4921C"/>
  <ellipse cx="62" cy="82" rx="10" ry="5" fill="#D4921C"/>

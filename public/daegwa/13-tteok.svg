<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 떡 거인: 거대한 흰 떡 보스 -->
  <!-- 거대한 몸통 (원통형 떡) -->
  <ellipse cx="50" cy="70" rx="35" ry="18" fill="#E8DDD0"/>
  <rect x="15" y="30" width="70" height="40" fill="#F5EDE0"/>
  <ellipse cx="50" cy="30" rx="35" ry="18" fill="#FFF8F0"/>
  <!-- 떡 단면 선 -->
  <ellipse cx="50" cy="30" rx="35" ry="18" fill="none" stroke="#D4C4B0" stroke-width="2"/>
  <!-- 팥 무늬/반점 -->
  <circle cx="40" cy="42" r="3" fill="#8B2525" opacity="0.7"/>
  <circle cx="55" cy="48" r="2.5" fill="#8B2525" opacity="0.7"/>
  <circle cx="65" cy="38" r="3" fill="#8B2525" opacity="0.7"/>
  <circle cx="30" cy="55" r="2" fill="#8B2525" opacity="0.7"/>
  <circle cx="70" cy="55" r="2.5" fill="#8B2525" opacity="0.7"/>
  <circle cx="48" cy="60" r="2" fill="#8B2525" opacity="0.7"/>
  <!-- 거대한 눈 -->
  <circle cx="38" cy="35" r="8" fill="white"/>
  <circle cx="62" cy="35" r="8" fill="white"/>
  <circle cx="39" cy="36" r="5" fill="#1a0000"/>
  <circle cx="63" cy="36" r="5" fill="#1a0000"/>
  <!-- 눈 하이라이트 -->
  <circle cx="41" cy="34" r="2" fill="white"/>
  <circle cx="65" cy="34" r="2" fill="white"/>
  <!-- 붉은 눈빛 (분노) -->
  <circle cx="40" cy="37" r="1.5" fill="#FF2200" opacity="0.7"/>
  <circle cx="64" cy="37" r="1.5" fill="#FF2200" opacity="0.7"/>
  <!-- 거대한 입 -->
  <path d="M36 52 Q50 62 64 52" stroke="#8B4513" stroke-width="3" fill="#CC6633" stroke-linecap="round"/>
  <rect x="38" y="52" width="24" height="10" rx="2" fill="#CC6633"/>
  <!-- 이빨 -->
  <rect x="41" y="52" width="5" height="6" rx="1" fill="white"/>
  <rect x="50" y="52" width="5" height="6" rx="1" fill="white"/>
  <rect x="59" y="52" width="5" height="6" rx="1" fill="white"/>
  <!-- 팔 (짧고 두꺼운) -->
  <ellipse cx="10" cy="45" rx="12" ry="10" fill="#EDE0CC" transform="rotate(15 10 45)"/>
  <ellipse cx="90" cy="45" rx="12" ry="10" fill="#EDE0CC" transform="rotate(-15 90 45)"/>
  <!-- 주먹 -->
  <circle cx="5" cy="38" r="7" fill="#E0D0BC"/>
  <circle cx="95" cy="38" r="7" fill="#E0D0BC"/>
  <!-- 발 (뭉툭하고 큰) -->
  <ellipse cx="35" cy="86" rx="14" ry="7" fill="#D9CCBC"/>
  <ellipse cx="65" cy="86" rx="14" ry="7" fill="#D9CCBC"/>
  <!-- 충격파 예고 선 -->
  <ellipse cx="50" cy="88" rx="40" ry="6" fill="none" stroke="#FF4400" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
</svg>

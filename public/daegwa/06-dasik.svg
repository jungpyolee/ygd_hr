<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <radialGradient id="dg" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="60%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>
  <!-- 다식 원형 몸통 -->
  <circle cx="30" cy="31" r="22" fill="url(#dg)"/>
  <!-- 상단 입체감 (약간 납작한 형태) -->
  <ellipse cx="30" cy="19" rx="18" ry="5" fill="#555555" opacity="0.5"/>
  <!-- 전통 꽃문양 (다식판 무늬) -->
  <!-- 중앙 원 -->
  <circle cx="30" cy="31" r="5" fill="none" stroke="#888888" stroke-width="1.2"/>
  <!-- 꽃잎 6개 -->
  <ellipse cx="30" cy="21" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1"/>
  <ellipse cx="30" cy="41" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1"/>
  <ellipse cx="21.3" cy="26" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1" transform="rotate(60 21.3 26)"/>
  <ellipse cx="38.7" cy="26" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1" transform="rotate(-60 38.7 26)"/>
  <ellipse cx="21.3" cy="36" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1" transform="rotate(-60 21.3 36)"/>
  <ellipse cx="38.7" cy="36" rx="3.5" ry="5" fill="none" stroke="#888888" stroke-width="1.1" transform="rotate(60 38.7 36)"/>
  <!-- 흑임자 (검은깨) 텍스처 -->
  <circle cx="18" cy="28" r="1" fill="#555"/>
  <circle cx="24" cy="22" r="0.8" fill="#555"/>
  <circle cx="36" cy="22" r="0.8" fill="#555"/>
  <circle cx="42" cy="28" r="1" fill="#555"/>
  <circle cx="42" cy="36" r="1" fill="#555"/>
  <circle cx="36" cy="42" r="0.8" fill="#555"/>
  <circle cx="24" cy="42" r="0.8" fill="#555"/>
  <circle cx="18" cy="36" r="1" fill="#555"/>
  <!-- 광택 -->
  <ellipse cx="23" cy="23" rx="6" ry="4" fill="white" opacity="0.1" transform="rotate(-30 23 23)"/>
  <!-- 테두리 -->
  <circle cx="30" cy="31" r="22" fill="none" stroke="#444" stroke-width="0.8"/>
</svg>

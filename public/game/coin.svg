<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="cg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#C47A00"/>
    </radialGradient>
    <radialGradient id="cg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C47A00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 엽전 몸체 -->
  <circle cx="20" cy="20" r="18" fill="url(#cg)" stroke="#8B5A00" stroke-width="1.5"/>
  <!-- 테두리 무늬 -->
  <circle cx="20" cy="20" r="15" fill="none" stroke="#C47A00" stroke-width="1" opacity="0.6"/>
  <!-- 중앙 사각 구멍 (엽전 스타일) -->
  <rect x="15" y="15" width="10" height="10" rx="1" fill="#8B5A00" stroke="#5C3800" stroke-width="0.8"/>
  <!-- 광택 -->
  <ellipse cx="14" cy="13" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-20 14 13)"/>
</svg>
